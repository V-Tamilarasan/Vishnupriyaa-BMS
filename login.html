<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN-PAGE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f6f8;
  --white:#fff;
  --border:#e4e7eb;
  --border2:#c9cdd4;

  --text:#111318;
  --sub:#5a6273;
  --muted:#9099a8;

  --accent:#2563eb;
  --accent-bg:#eff4ff;
  --accent-dark:#1d4ed8;

  --success:#16a34a;
  --danger:#dc2626;

  --r:10px;
  --rs:7px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:13.5px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/*───────────────── LOCK SCREEN ─────────────────*/

#lockScreen{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}

.lock-box{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:16px;
  padding:2.2rem 1.8rem 1.8rem;
  width:300px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  text-align:center;
}

.lock-brand{
  font-size:1.3rem;
  font-weight:700;
  color:var(--accent);
  letter-spacing:-.4px;
  margin-bottom:.15rem;
}

.lock-brand span{
  color:var(--text);
}

.lock-sub{
  font-size:.7rem;
  color:var(--muted);
  margin-bottom:1.6rem;
}

#lockLogoWrap{
  display:none;
  margin-bottom:.55rem;
}

#lockLogoImg{
  width:46px;
  height:46px;
  object-fit:contain;
  border-radius:8px;
  border:1px solid var(--border);
}

.pin-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:1.4rem;
}

.pin-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  transition:all .15s;
}

.pin-dot.filled{
  background:var(--accent);
  border-color:var(--accent);
}

.pin-dot.error{
  background:var(--danger);
  border-color:var(--danger);
  animation:shake .3s;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}

.pin-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.pin-key{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--rs);
  padding:.72rem;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:background .12s,transform .1s;
  color:var(--text);
  font-family:'Inter',sans-serif;
}

.pin-key:hover{
  background:var(--accent-bg);
  border-color:var(--accent);
}

.pin-key:active{
  transform:scale(.92);
}

.pin-key.del{
  font-size:.8rem;
  color:var(--sub);
}

.lock-hint{
  margin-top:.85rem;
  font-size:.68rem;
  color:var(--muted);
}

/* ───────────────── SETUP SCREEN ───────────────── */

#setupScreen{
  display:none;
  align-items:center;
  justify-content:center;
  width:100%;
}

.setup-box{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:16px;
  padding:2rem;
  width:320px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
}

.setup-logo{
  font-size:1.1rem;
  font-weight:700;
  color:var(--accent);
  text-align:center;
  margin-bottom:.2rem;
}

.setup-logo span{
  color:var(--text);
}

.fg{
  display:flex;
  flex-direction:column;
  gap:.18rem;
  margin-bottom:.52rem;
}

.fg label{
  font-size:.58rem;
  font-weight:600;
  color:var(--sub);
  text-transform:uppercase;
  letter-spacing:.06em;
}

input[type=text],
input[type=password]{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--rs);
  padding:.4rem .58rem;
  font-family:'Inter',sans-serif;
  font-size:.8rem;
  color:var(--text);
  outline:none;
  width:100%;
  transition:border-color .15s,background .15s;
}

input:focus{
  border-color:var(--accent);
  background:var(--white);
}

.btn-primary{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--rs);
  padding:.46rem .95rem;
  font-family:'Inter',sans-serif;
  font-size:.77rem;
  font-weight:600;
  cursor:pointer;
  transition:all .12s;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}

.btn-primary:hover{
  background:var(--accent-dark);
}

.btn-primary:active{
  transform:scale(.98);
}

/* ───────────────── REDIRECT OVERLAY ───────────────── */

#redirectOverlay{
  position:fixed;
  inset:0;
  background:rgba(245,246,248,.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:14px;
  z-index:999;
  backdrop-filter:blur(4px);
}

#redirectOverlay.show{
  display:flex;
}

.spinner{
  width:36px;
  height:36px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.redir-txt{
  font-size:.85rem;
  font-weight:600;
  color:var(--success);
}

.redir-sub{
  font-size:.65rem;
  color:var(--muted);
}
</style>
</head>

<body>

<!-- ───────────────── LOCK SCREEN ───────────────── -->

<div id="lockScreen">
  <div class="lock-box">

    <div id="lockLogoWrap">
      <img id="lockLogoImg" src="" alt="logo">
    </div>

    <div class="lock-brand">
      Viishnupryaa <span>BMS</span>
    </div>

    <div class="lock-sub" id="lockStore">
      Daily Collection Tracker
    </div>

    <div class="pin-row" id="pinDisp">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>

    <div class="pin-grid">
      <button class="pin-key" onclick="pk('1')">1</button>
      <button class="pin-key" onclick="pk('2')">2</button>
      <button class="pin-key" onclick="pk('3')">3</button>

      <button class="pin-key" onclick="pk('4')">4</button>
      <button class="pin-key" onclick="pk('5')">5</button>
      <button class="pin-key" onclick="pk('6')">6</button>

      <button class="pin-key" onclick="pk('7')">7</button>
      <button class="pin-key" onclick="pk('8')">8</button>
      <button class="pin-key" onclick="pk('9')">9</button>

      <button class="pin-key" onclick="pk('0')" style="grid-column:2;">
        0
      </button>

      <button class="pin-key del" onclick="pdel()">
        ⌫
      </button>
    </div>

    <div class="lock-hint" id="lockHint">
      Enter PIN · or type on keyboard
    </div>

  </div>
</div>

<!-- ───────────────── SETUP SCREEN ───────────────── -->

<div id="setupScreen">
  <div class="setup-box">

    <div class="setup-logo">
      Viishnupryaa <span>BMS</span>
    </div>

    <div style="text-align:center;font-size:.68rem;color:var(--muted);margin-bottom:1.2rem;">
      First time setup
    </div>

    <div style="font-size:.84rem;font-weight:700;margin-bottom:.7rem;">
      Create your account
    </div>

    <div class="fg">
      <label>Store Name</label>
      <input type="text" id="setupStore">
    </div>

    <div class="fg">
      <label>Set PIN (4–6 digits)</label>
      <input type="password" id="setupPin" maxlength="6" inputmode="numeric" placeholder="••••">
    </div>

    <div class="fg" style="margin-bottom:1rem;">
      <label>Confirm PIN</label>
      <input type="password" id="setupPin2" maxlength="6" inputmode="numeric" placeholder="••••">
    </div>

    <button class="btn-primary" onclick="completeSetup()">
      Create Account & Enter
    </button>

    <div id="setupErr"
         style="color:var(--danger);font-size:.66rem;margin-top:.45rem;text-align:center;min-height:1rem;">
    </div>

  </div>
</div>

<!-- ───────────────── REDIRECT OVERLAY ───────────────── -->

<div id="redirectOverlay">

  <div class="spinner"></div>

  <div class="redir-txt">
    ✓ Access granted
  </div>

  <div class="redir-sub">
    Redirecting…
  </div>

</div>

<script>

const DB_KEY = 'viishnupryaa_bms_v1';

function defDB() {
  return {
    pin: null,
    store: 'My Store',
    logo: null,
    modeLogos: {},
    entries: [],
    expenses: []
  };
}

let db = JSON.parse(localStorage.getItem(DB_KEY) || 'null') || defDB();
let pinBuf = '';

/* ───────────────── INIT ───────────────── */

window.onload = () => {

  if (!db.pin) {

    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';

  } else {

    document.getElementById('lockStore').textContent =
      db.store || 'Daily Collection Tracker';

    if (db.logo) {
      document.getElementById('lockLogoImg').src = db.logo;
      document.getElementById('lockLogoWrap').style.display = '';
    }

    updateDots();
  }

  document.addEventListener('keydown', e => {

    if (document.getElementById('lockScreen').style.display === 'none')
      return;

    if (e.key >= '0' && e.key <= '9')
      pk(e.key);

    else if (e.key === 'Backspace')
      pdel();
  });
};

/* ───────────────── FIRST TIME SETUP ───────────────── */

function completeSetup() {

  const s = get('setupStore');
  const p = get('setupPin');
  const p2 = get('setupPin2');

  const err = document.getElementById('setupErr');

  err.textContent = '';

  if (!s) {
    err.textContent = 'Enter store name.';
    return;
  }

  if (p.length < 4) {
    err.textContent = 'PIN must be 4–6 digits.';
    return;
  }

  if (!/^\d+$/.test(p)) {
    err.textContent = 'Digits only.';
    return;
  }

  if (p !== p2) {
    err.textContent = 'PINs do not match.';
    return;
  }

  db.pin = p;
  db.store = s;

  localStorage.setItem(DB_KEY, JSON.stringify(db));

  redirectToApp();
}

/* ───────────────── PIN ENTRY ───────────────── */

function pk(k) {

  if (pinBuf.length >= db.pin.length)
    return;

  pinBuf += k;

  updateDots();

  if (pinBuf.length === db.pin.length) {

    setTimeout(() => {

      if (pinBuf === db.pin) {

        redirectToApp();

      } else {

        pinErr();

        pinBuf = '';

        setTimeout(updateDots, 600);
      }

    }, 120);
  }
}

function pdel() {

  if (pinBuf.length > 0) {

    pinBuf = pinBuf.slice(0, -1);

    updateDots();
  }
}

function updateDots() {

  const len = db.pin ? db.pin.length : 4;

  for (let i = 0; i < 6; i++) {

    const d = document.getElementById('d' + i);

    d.style.display = i < len ? 'block' : 'none';

    d.className =
      'pin-dot' + (i < pinBuf.length ? ' filled' : '');
  }
}

function pinErr() {

  const len = db.pin ? db.pin.length : 4;

  for (let i = 0; i < len; i++) {
    document.getElementById('d' + i).className =
      'pin-dot filled error';
  }

  const h = document.getElementById('lockHint');

  h.textContent = 'Incorrect PIN. Try again.';
  h.style.color = 'var(--danger)';

  setTimeout(() => {
    h.textContent = 'Enter PIN · or type on keyboard';
    h.style.color = '';
  }, 1500);
}

/* ───────────────── REDIRECT ───────────────── */

function redirectToApp() {

  document
    .getElementById('redirectOverlay')
    .classList.add('show');

  setTimeout(() => {
    window.location.href = 'index.html';
  }, 1200);
}

function get(id) {
  return document.getElementById(id).value.trim();
}

</script>

</body>
</html>
